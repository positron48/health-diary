services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: health_diary
      POSTGRES_USER: health_diary
      POSTGRES_PASSWORD: health_diary
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health_diary -d health_diary"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "15432:5432"
    volumes:
      - health_diary_postgres:/var/lib/postgresql/data

  app:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "18080:8080"

volumes:
  health_diary_postgres:
